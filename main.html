<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Robot Snooze — TechQuest 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #050710;
      --surface:  #0b0e1f;
      --surface2: #0f1228;
      --border:   #1a1f3a;
      --accent:   #b06dff;
      --accent2:  #7c3aed;
      --neon:     #d946ef;
      --cyan:     #22d3ee;
      --green:    #4ade80;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --dim:      #94a3b8;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── custom cursor ── */
    .cursor {
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform .08s, background .2s, width .2s, height .2s;
      mix-blend-mode: screen;
    }
    .cursor-ring {
      width: 36px; height: 36px;
      border: 1.5px solid rgba(176,109,255,.5);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform .18s ease, border-color .2s;
    }
    .cursor.hovering { width: 20px; height: 20px; background: var(--neon); }
    .cursor-ring.hovering { width: 52px; height: 52px; border-color: var(--neon); }

    /* ── canvas bg ── */
    #particles-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; opacity: .6;
    }

    /* ── grid overlay ── */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(176,109,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(176,109,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── nav ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 64px;
      background: rgba(5,7,16,.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(176,109,255,.15);
    }
    .nav-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem; font-weight: 700;
      color: var(--text); text-decoration: none;
      letter-spacing: .05em;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { list-style: none; display: flex; gap: 2rem; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: .9rem; font-weight: 500; letter-spacing: .06em;
      text-transform: uppercase;
      transition: color .2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    /* ── page wrap ── */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 6rem;
      position: relative; z-index: 1;
    }

    /* ── back ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: .5rem;
      color: var(--muted); text-decoration: none;
      font-size: .82rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: 2.5rem;
      transition: color .2s;
    }
    .back-btn:hover { color: var(--accent); }
    .back-btn svg { transition: transform .2s; }
    .back-btn:hover svg { transform: translateX(-4px); }

    /* ── hero ── */
    .hero { margin-bottom: 2rem; position: relative; }

    .cat-pill {
      display: inline-flex; align-items: center; gap: .45rem;
      padding: .3rem .9rem;
      border-radius: 999px;
      font-size: .72rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      background: rgba(176,109,255,.08);
      color: var(--accent);
      border: 1px solid rgba(176,109,255,.25);
      margin-bottom: 1.2rem;
    }
    .cat-pill-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 1.8s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: .4; transform: scale(.6); }
    }

    .hero-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -.01em;
      margin-bottom: 1rem;
    }
    .hero-title .line1 { display: block; color: var(--text); }
    .hero-title .line2 {
      display: block;
      background: linear-gradient(90deg, var(--accent) 0%, var(--neon) 60%, var(--cyan) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: hue-shift 5s linear infinite;
    }
    @keyframes hue-shift {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .hero-tagline {
      color: var(--dim); font-size: 1.1rem; max-width: 580px;
      font-weight: 400; line-height: 1.7;
    }

    /* ── scanline ── */
    .scanline-bar {
      width: 100%; height: 2px; margin: 2rem 0;
      background: linear-gradient(90deg, transparent, var(--accent), var(--neon), var(--cyan), transparent);
      position: relative; overflow: hidden;
    }
    .scanline-bar::after {
      content: '';
      position: absolute; top: 0; left: -60%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      animation: scan 2.5s linear infinite;
    }
    @keyframes scan { to { left: 160%; } }

    /* ── meta chips ── */
    .meta-row { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: 2.5rem; }
    .meta-chip {
      display: flex; align-items: center; gap: .5rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: .45rem .9rem;
      font-size: .85rem; color: var(--text);
      font-weight: 500;
      transition: border-color .2s, background .2s;
    }
    .meta-chip:hover { border-color: rgba(176,109,255,.4); background: var(--surface2); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    /* ── section label ── */
    .sec-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .7rem; letter-spacing: .2em;
      text-transform: uppercase; color: var(--cyan);
      margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .sec-label::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(34,211,238,.3), transparent);
    }

    /* ── overview ── */
    .overview-text { color: var(--dim); font-size: 1.05rem; line-height: 1.8; }
    .overview-text b { color: var(--accent); font-weight: 700; }
    .overview-text p + p { margin-top: .85rem; }

    /* ── GAMES GRID ── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem; margin-top: 1rem;
    }
    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem;
      position: relative; overflow: hidden;
      transition: transform .25s, border-color .25s, box-shadow .25s;
      cursor: default;
    }
    .game-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(176,109,255,.06), transparent 60%);
      opacity: 0; transition: opacity .25s;
    }
    .game-card:hover { transform: translateY(-4px); border-color: rgba(176,109,255,.35); box-shadow: 0 8px 30px rgba(176,109,255,.12); }
    .game-card:hover::before { opacity: 1; }
    .game-icon {
      font-size: 2rem; margin-bottom: .8rem;
      display: block;
      transition: transform .25s;
    }
    .game-card:hover .game-icon { transform: scale(1.15) rotate(-4deg); }
    .game-name {
      font-family: 'Orbitron', monospace;
      font-size: .85rem; font-weight: 700;
      color: var(--text); margin-bottom: .5rem;
      letter-spacing: .04em;
    }
    .game-desc { color: var(--dim); font-size: .88rem; line-height: 1.6; }
    .game-tag {
      display: inline-block; margin-top: .75rem;
      padding: .2rem .6rem;
      border-radius: 6px;
      font-size: .68rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
    }
    .tag-run { background: rgba(74,222,128,.1); color: var(--green); border: 1px solid rgba(74,222,128,.2); }
    .tag-jump { background: rgba(34,211,238,.1); color: var(--cyan); border: 1px solid rgba(34,211,238,.2); }
    .tag-nav { background: rgba(217,70,239,.1); color: var(--neon); border: 1px solid rgba(217,70,239,.2); }
    .tag-team { background: rgba(176,109,255,.1); color: var(--accent); border: 1px solid rgba(176,109,255,.2); }

    /* ── pre-event ── */
    .pre-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; margin-top: .5rem;
    }
    .pre-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.2rem;
      transition: border-color .2s;
    }
    .pre-card:hover { border-color: rgba(34,211,238,.3); }
    .pre-card-lbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem; letter-spacing: .12em;
      text-transform: uppercase; color: var(--cyan); margin-bottom: .4rem;
    }
    .pre-card-val { color: var(--dim); font-size: .92rem; font-weight: 500; }

    /* ── round cards ── */
    .round-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.4rem 1.6rem; margin-bottom: 1rem;
      position: relative; overflow: hidden;
      transition: border-color .25s;
    }
    .round-card::after {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--neon));
    }
    .round-card:hover { border-color: rgba(176,109,255,.3); }
    .round-lbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: .68rem; letter-spacing: .14em; text-transform: uppercase;
      color: var(--accent2); margin-bottom: .35rem;
    }
    .round-name {
      font-family: 'Orbitron', monospace;
      font-size: 1rem; font-weight: 700;
      color: var(--text); margin-bottom: .9rem;
    }
    .round-body p { color: var(--dim); margin-bottom: .6rem; font-size: .95rem; }
    .round-body ul { padding-left: 1.2rem; }
    .round-body ul li { color: var(--dim); margin-bottom: .4rem; font-size: .92rem; }
    .round-body ul li b { color: var(--accent); }

    /* ── scoring table ── */
    .score-table { width: 100%; border-collapse: collapse; margin-top: .75rem; }
    .score-table th, .score-table td {
      text-align: left; padding: .7rem 1rem;
      font-size: .9rem; border-bottom: 1px solid var(--border);
    }
    .score-table th {
      font-family: 'Share Tech Mono', monospace;
      color: var(--cyan); font-weight: 400;
      font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
    }
    .score-table td { color: var(--dim); }
    .score-table td:last-child { color: var(--accent); font-weight: 700; font-family: 'Orbitron', monospace; font-size: .88rem; }
    .score-table tr:last-child td { border-bottom: none; color: var(--text); font-weight: 700; }
    .score-table tr:last-child td:last-child { color: var(--neon); }
    .score-table tr { transition: background .2s; }
    .score-table tbody tr:not(:last-child):hover { background: rgba(176,109,255,.04); }

    .tiebreaker-note {
      margin-top: 1rem;
      padding: .75rem 1rem;
      background: rgba(34,211,238,.05); border: 1px solid rgba(34,211,238,.15);
      border-radius: 8px; color: var(--dim); font-size: .88rem;
    }
    .tiebreaker-note b { color: var(--cyan); }

    /* ── rules ── */
    .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .rule-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.3rem 1.5rem;
    }
    .rule-card.allowed { border-color: rgba(74,222,128,.2); }
    .rule-card.banned  { border-color: rgba(239,68,68,.2); }
    .rule-title {
      font-family: 'Orbitron', monospace;
      font-size: .82rem; font-weight: 700;
      margin-bottom: 1rem; letter-spacing: .05em;
    }
    .rule-card.allowed .rule-title { color: var(--green); }
    .rule-card.banned  .rule-title { color: #f87171; }
    .rule-list { list-style: none; padding: 0; }
    .rule-list li {
      color: var(--dim); font-size: .9rem;
      padding: .35rem 0; padding-left: 1.4rem;
      position: relative; border-bottom: 1px solid var(--border);
    }
    .rule-list li:last-child { border-bottom: none; }
    .rule-list li::before { position: absolute; left: 0; }
    .rule-card.allowed .rule-list li::before { content: '✓'; color: var(--green); }
    .rule-card.banned  .rule-list li::before { content: '✕'; color: #f87171; }

    /* ── hosts ── */
    .host-grid { display: flex; flex-direction: column; gap: .7rem; }
    .host-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: .9rem 1.2rem;
      display: flex; align-items: center; gap: .8rem;
      font-size: .95rem; color: var(--text); font-weight: 500;
      transition: border-color .2s, background .2s;
    }
    .host-item:hover { border-color: rgba(176,109,255,.3); background: var(--surface2); }
    .host-tag {
      background: rgba(176,109,255,.1); color: var(--accent);
      border: 1px solid rgba(176,109,255,.25);
      border-radius: 6px; font-size: .68rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      padding: .22rem .6rem; white-space: nowrap;
      font-family: 'Share Tech Mono', monospace;
    }

    /* ── divider ── */
    .div { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }

    /* ── section block ── */
    .sec { margin-bottom: 1.5rem; }

    /* ── scroll reveal ── */
    .reveal {
      opacity: 0; transform: translateY(28px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── stat bar ── */
    .stat-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem; margin-top: .5rem;
    }
    .stat-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.2rem; text-align: center;
      position: relative; overflow: hidden;
      transition: border-color .25s, transform .25s;
    }
    .stat-box:hover { border-color: rgba(176,109,255,.4); transform: translateY(-3px); }
    .stat-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--neon));
    }
    .stat-num {
      font-family: 'Orbitron', monospace;
      font-size: 2rem; font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--neon));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-lbl {
      color: var(--muted); font-size: .78rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase; margin-top: .25rem;
    }

    /* ── REALISTIC GLITCH ── */
    .glitch-wrap {
      position: relative;
      display: inline-block;
      /* random trigger via animation */
      animation: glitch-trigger 6s steps(1) infinite;
    }

    /* The two chromatic aberration layers */
    .glitch-wrap::before,
    .glitch-wrap::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: inherit;
      line-height: inherit;
      letter-spacing: inherit;
      white-space: nowrap;
      overflow: hidden;
      pointer-events: none;
    }

    /* RED / magenta channel — left offset */
    .glitch-wrap::before {
      color: #ff2d78;
      text-shadow: none;
      left: 0; top: 0;
      animation: glitch-red 6s steps(1) infinite;
      opacity: 0;
      mix-blend-mode: screen;
    }

    /* CYAN channel — right offset */
    .glitch-wrap::after {
      color: #00f0ff;
      text-shadow: none;
      left: 0; top: 0;
      animation: glitch-cyan 6s steps(1) infinite;
      opacity: 0;
      mix-blend-mode: screen;
    }

    /* Main text jitter */
    @keyframes glitch-trigger {
      0%,  9%  { transform: none; }
      10%       { transform: translate(-2px, 1px) skewX(-1deg); }
      10.5%     { transform: translate(3px, -1px) skewX(2deg); }
      11%       { transform: translate(-1px, 2px) skewX(-1deg); }
      11.5%     { transform: none; }
      /* second burst */
      42%       { transform: none; }
      42.5%     { transform: translate(4px, 0) skewX(3deg); }
      43%        { transform: translate(-3px, 1px); }
      43.5%     { transform: translate(1px, -1px) skewX(-2deg); }
      44%        { transform: none; }
      /* third burst */
      77%       { transform: none; }
      77.3%     { transform: translate(-4px, -1px) skewX(4deg); }
      77.6%     { transform: translate(2px, 2px) skewX(-2deg); }
      77.9%     { transform: translate(-1px, 0); }
      78%        { transform: none; }
      100%      { transform: none; }
    }

    @keyframes glitch-red {
      0%,  9.9%  { opacity: 0; transform: none; clip-path: none; }
      10%         { opacity: .8; transform: translate(-4px, 0); clip-path: inset(5% 0 80% 0); }
      10.3%       { clip-path: inset(55% 0 30% 0); transform: translate(3px, 0); }
      10.6%       { clip-path: inset(30% 0 55% 0); transform: translate(-3px, 1px); }
      10.9%       { clip-path: inset(75% 0 10% 0); transform: translate(4px, 0); }
      11%         { opacity: 0; transform: none; clip-path: none; }

      42%,  42.4% { opacity: 0; }
      42.5%       { opacity: .9; transform: translate(-5px, 1px); clip-path: inset(10% 0 70% 0); }
      42.7%       { clip-path: inset(40% 0 40% 0); transform: translate(4px, -1px); }
      43%         { clip-path: inset(65% 0 15% 0); transform: translate(-2px, 0); }
      43.2%       { opacity: 0; clip-path: none; }

      77%,  77.2% { opacity: 0; }
      77.3%       { opacity: .85; transform: translate(-3px, -1px); clip-path: inset(20% 0 60% 0); }
      77.5%       { clip-path: inset(50% 0 25% 0); transform: translate(5px, 0); }
      77.7%       { clip-path: inset(70% 0 5% 0); transform: translate(-4px, 1px); }
      77.9%       { opacity: 0; clip-path: none; }
      100%        { opacity: 0; }
    }

    @keyframes glitch-cyan {
      0%,  9.9%  { opacity: 0; transform: none; clip-path: none; }
      10%         { opacity: .7; transform: translate(4px, -1px); clip-path: inset(15% 0 70% 0); }
      10.3%       { clip-path: inset(45% 0 40% 0); transform: translate(-3px, 0); }
      10.6%       { clip-path: inset(65% 0 20% 0); transform: translate(3px, 1px); }
      10.9%       { clip-path: inset(85% 0 5% 0); transform: translate(-4px, 0); }
      11%         { opacity: 0; transform: none; clip-path: none; }

      42%,  42.4% { opacity: 0; }
      42.5%       { opacity: .75; transform: translate(5px, -1px); clip-path: inset(5% 0 80% 0); }
      42.7%       { clip-path: inset(30% 0 55% 0); transform: translate(-4px, 1px); }
      43%         { clip-path: inset(60% 0 25% 0); transform: translate(3px, 0); }
      43.2%       { opacity: 0; clip-path: none;
